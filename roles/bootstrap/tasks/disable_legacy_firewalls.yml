---
# playbooks/tasks/disable_legacy_firewalls.yml

- name: Purge UFW completely
  ansible.builtin.apt:
    name: ufw
    state: absent
    purge: true
    autoremove: true

# This task must run to populate ansible_facts.services
- name: Gather service facts
  ansible.builtin.service_facts:


- name: Stop and disable nftables service
  ansible.builtin.systemd:
    name: nftables
    state: stopped
    enabled: false
  when: "'nftables.service' in ansible_facts.services"



- name: Install iptables packages (iptables + persistence)
  ansible.builtin.apt:
    name:
      - iptables
      - iptables-persistent
    state: present
    update_cache: yes

- name: Unmask and ensure netfilter-persistent service
  ansible.builtin.systemd:
    name: netfilter-persistent
    enabled: true
    masked: false

- name: Enable netfilter-persistent
  ansible.builtin.systemd:
    name: netfilter-persistent
    enabled: true
    state: started
    masked: false

- name: Flush any existing iptables rules (clean start)
  ansible.builtin.iptables:
    flush: true
    table: "{{ item.table | default('filter') }}"
    chain: "{{ item.chain }}"
  loop:
    - { chain: INPUT }
    - { chain: FORWARD }
    - { chain: OUTPUT }
    - { chain: PREROUTING, table: nat }
    - { chain: POSTROUTING, table: nat }
    - { chain: PREROUTING, table: mangle }
    - { chain: POSTROUTING, table: mangle }
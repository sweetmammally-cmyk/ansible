---
- name: Bootstrap and Harden Server
  hosts: all
  become: true

  # 1. Variables to control the complex roles
  vars:
    os_security_manage_firewall: false 
    os_env_extra_user_paths: ['/usr/bin/docker']


  # 2. Execute the production-ready hardening roles
  roles:
    - role: bootstrap
    - role: os_hardening
    - role: ssh_hardening


---
- name: Bootstrap and Harden Server
  hosts: all
  become: true

  vars:
    os_security_manage_firewall: false
    os_env_extra_user_paths:
      - /usr/bin/docker

  roles:
    - role: bootstrap
      tags: bootstrap_role

    - role: os_hardening
      tags: os_hardening_role

    - role: ssh_hardening
      tags: ssh_hardening_role
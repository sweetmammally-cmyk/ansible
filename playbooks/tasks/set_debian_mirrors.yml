---
- name: Remove existing apt sources list
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/debian.sources
    - /etc/apt/sources.list.d/debian.servers
    - /etc/apt/sources.list.d/ubuntu.sources # Cleanup if it was misconfigured
    - /etc/apt/sources.list.d/ubuntu.servers # Cleanup if it was misconfigured
  when: ansible_distribution == "Debian"

- name: Configure Debian mirrors (using Ansible facts)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list
    content: |
      # This file is managed by Ansible. Manual changes will be overwritten.
      deb http://{{ debian_mirror }} {{ ansible_distribution_release }} main
      deb http://{{ debian_sec_mirror }} {{ ansible_distribution_release }}-security main
    owner: root
    group: root
    mode: '0644'
    backup: yes
    # Validates syntax before overwriting the production file
    validate: /usr/bin/apt-get update --print-uris
  when: ansible_distribution == "Debian"
  notify: update apt cache
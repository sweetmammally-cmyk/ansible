---
# playbooks/tasks/generate_ssh_port.yml

- name: Check if connection info file exists locally
  ansible.builtin.stat:
    path: ssh_connections.txt
  delegate_to: localhost
  register: conn_file

- name: Check if host already has a generated port
  ansible.builtin.shell: "grep '^Host: {{ inventory_hostname }} |' ssh_connections.txt | awk -F 'Port: ' '{print $2}' | awk '{print $1}'"
  delegate_to: localhost
  register: saved_port
  when: conn_file.stat.exists
  changed_when: false
  ignore_errors: true

- name: Set dynamic SSH port fact (40000 - 49999)
  ansible.builtin.set_fact:
    # Uses the saved port if it exists, otherwise generates a random 5-digit port starting with 4
    ssh_port: "{{ saved_port.stdout if (saved_port.stdout is defined and saved_port.stdout | length > 0) else (40000 + (10000 | random)) }}"

- name: Append connection info to local text file
  ansible.builtin.lineinfile:
    path: ssh_connections.txt
    line: "Host: {{ inventory_hostname }} | IP: {{ ansible_host | default(inventory_hostname) }} | Port: {{ ssh_port }} | User: {{ ansible_user | default('root') }}"
    create: yes
  delegate_to: localhost
  # Only write to the file if we generated a brand new port
  when: not conn_file.stat.exists or saved_port.stdout == ""
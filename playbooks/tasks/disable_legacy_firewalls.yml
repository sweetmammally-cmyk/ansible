---
# playbooks/tasks/disable_legacy_firewalls.yml

- name: Purge competing legacy firewall packages
  ansible.builtin.apt:
    name:
      - ufw
      - netfilter-persistent
    state: absent
    purge: yes

- name: Install iptables-persistent
  ansible.builtin.apt:
    name:
      - iptables
      - iptables-persistent
    state: present

- name: Stop and disable competing firewall services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - ufw
  ignore_errors: true

- name: Ensure iptables service is enabled and started
  ansible.builtin.systemd:
    name: netfilter-persistent
    state: started
    enabled: yes